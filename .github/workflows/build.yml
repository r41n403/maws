name: Build & Release DMG

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm test

      # ── Build DMG ────────────────────────────────────────────────────────
      # No code signing — personal use only.
      # First launch: right-click the .app → Open to bypass Gatekeeper.
      - name: Build DMG
        run: npm run build
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Notarize (tags only) ─────────────────────────────────────────────
      - name: Notarize DMG
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          DMG=$(ls dist/*.dmg | head -1)
          xcrun notarytool submit "$DMG" \
            --key <(echo "$APPLE_API_KEY") \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --team-id "5S2BM3ZKH5" \
            --wait
          xcrun stapler staple "$DMG"
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      # ── Upload artifact on every push to main (14-day test builds) ───────
      - name: Upload DMG artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: Maws-DMG
          path: dist/*.dmg
          retention-days: 14

      # ── Create GitHub Release on version tags (v*.*.*) ───────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
