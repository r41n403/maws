appId: com.r41n403.maws
productName: Maws
copyright: Copyright © 2026 r41n403

directories:
  output: dist

files:
  - src/**/*
  - package.json
  - "!node_modules/**/{CHANGELOG.md,README.md,readme.md,test,__tests__,tests,powered-test,example,examples,.nyc_output}"

mac:
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  identity: "Developer ID Application"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  notarize:
    teamId: 5S2BM3ZKH5

dmg:
  title: "Maws ${version}"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

nsis:
  oneClick: false

publish:
  provider: github
  owner: r41n403
  repo: maws
